<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Will Rank PWA</title>
    <style>
        body {
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #app-container {
            width: 240px;
            height: 320px;
            background-color: #f3f4f6;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn { cursor: pointer; display: none; }

        /* Main Screen */
        #main-screen, #rank-screen {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .counter-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .circle {
            width: 130px;
            height: 130px;
            border: 4px solid #d1d5db;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .days { font-size: 18px; font-weight: bold; }
        .timer { font-size: 11px; color: #6b7280; }

        /* Rank Screen Design */
        #rank-screen {
            display: none;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .rank-card {
            background: white;
            margin: 5px 10px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .rank-name { font-size: 13px; font-weight: bold; color: #2c3e50; border-bottom: 1px solid #eee; margin-bottom: 3px; }
        .rank-req { font-size: 10px; color: #7f8c8d; }
        .achieved { background-color: #d1fae5; border-color: #10b981; }

        .controls {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            background: #fff;
        }

        .btn { border: none; background: none; font-size: 10px; cursor: pointer; text-align: center;}
        .icon-btn { width: 30px; height: 30px; background: #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 3px; }

        #reset-btn {
            position: absolute; right: 10px; top: 120px; background: #ff4d4d; color: white;
            border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <span id="back-arrow" class="back-btn" onclick="showMain()">←</span>
        <span id="header-title">Iron Will</span>
        <span></span>
    </header>

    <div id="main-screen">
        <button id="reset-btn" onclick="resetCounter()">↺</button>
        <div class="counter-section">
            <div class="circle">
                <div class="days" id="display-days">0 days</div>
                <div class="timer" id="display-time">00:00:00</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn" onclick="showRanks()">
                <div class="icon-btn">★</div>My Rank
            </button>
            <button class="btn" onclick="showHistory()">
                <div class="icon-btn">🕒</div>History
            </button>
        </div>
    </div>

    <div id="rank-screen">
        <div id="rank-list"></div>
    </div>
</div>

<script>
    let startTime = localStorage.getItem('startTime') || Date.now();
    localStorage.setItem('startTime', startTime);

    const ranks = [
        { name: "Scout", days: 1 }, { name: "Private", days: 3 },
        { name: "Corporal", days: 5 }, { name: "Sergeant", days: 7 },
        { name: "Master Sergeant", days: 10 }, { name: "Knight", days: 14 },
        { name: "Knight-Lieutenant", days: 21 }, { name: "Knight-Captain", days: 30 },
        { name: "Knight-Champion", days: 60 }, { name: "Champion of the Light", days: 90 },
        { name: "Commander", days: 120 }, { name: "Conqueror", days: 150 },
        { name: "Marshal", days: 180 }, { name: "Field Marshal", days: 240 },
        { name: "Grand Marshal", days: 365 }
    ];

    function updateDisplay() {
        const diff = Date.now() - startTime;
        const s = Math.floor((diff / 1000) % 60);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));

        document.getElementById('display-days').innerText = d + " days";
        document.getElementById('display-time').innerText = 
            (h<10?"0":"")+h + ":" + (m<10?"0":"")+m + ":" + (s<10?"0":"")+s;
        return d;
    }

    function showRanks() {
        const currentDays = updateDisplay();
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        ranks.forEach(r => {
            const isAchieved = currentDays >= r.days;
            list.innerHTML += `
                <div class="rank-card ${isAchieved ? 'achieved' : ''}">
                    <div class="rank-name">${r.name}</div>
                    <div class="rank-req">Reach ${r.days} day${r.days>1?'s':''}</div>
                </div>`;
        });
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('rank-screen').style.display = 'block';
        document.getElementById('back-arrow').style.display = 'inline';
        document.getElementById('header-title').innerText = "My Rank";
    }

    function showMain() {
        document.getElementById('main-screen').style.display = 'flex';
        document.getElementById('rank-screen').style.display = 'none';
        document.getElementById('back-arrow').style.display = 'none';
        document.getElementById('header-title').innerText = "Iron Will";
    }

    function resetCounter() {
        if(confirm("Reset streak?")) {
            localStorage.setItem('lastReset', new Date().toLocaleString());
            startTime = Date.now();
            localStorage.setItem('startTime', startTime);
            updateDisplay();
        }
    }

    function showHistory() {
        alert("Last Reset: " + (localStorage.getItem('lastReset') || "No history"));
    }

    setInterval(updateDisplay, 1000);
    updateDisplay();
</script>
</body>
</html>
