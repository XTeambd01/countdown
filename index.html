<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Will Rank Fixed J2ME Control</title>
    <style>
        body { background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        #app-container { width: 240px; height: 320px; background-color: #f3f4f6; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid #ddd; }
        header { background-color: #2c3e50; color: white; padding: 5px; font-size: 13px; font-weight: bold; text-align: center; }
        .screen { flex-grow: 1; display: flex; flex-direction: column; width: 100%; height: 260px; position: relative; }
        #rank-screen, #history-screen { display: none; overflow-y: auto; background: #f8f9fa; }

        /* Counter UI */
        .counter-section { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .circle { width: 110px; height: 110px; border: 4px solid #d1d5db; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; margin-bottom: 15px; }
        .days-val { font-size: 18px; font-weight: bold; color: #333; }
        .timer-val { font-size: 10px; color: #6b7280; }

        /* Controls */
        .controls { display: flex; justify-content: space-around; padding: 10px 0; background: #fff; border-top: 1px solid #ddd; }
        .btn { border: none; background: none; font-size: 9px; cursor: pointer; text-align: center;}
        .icon-btn { width: 30px; height: 30px; background: #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 3px; font-size: 14px; }
        #reset-btn { position: absolute; right: 10px; top: 120px; background: #ff4d4d; color: white; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; z-index: 10; font-size: 16px; }

        /* Rank & History Style */
        .card { background: white; margin: 5px 8px; padding: 8px; border-radius: 4px; border: 1px solid #ddd; text-align: center; }
        .card-title { font-size: 11px; font-weight: bold; color: #2c3e50; border-bottom: 1px solid #eee; margin-bottom: 2px; display: block; }
        .card-sub { font-size: 9px; color: #7f8c8d; }
        .achieved { background-color: #d1fae5; border-color: #10b981; }

        /* Physical Back Button Key Icon (SS visual reference only) */
        .back-key-visual { position: absolute; bottom: 5px; right: 5px; font-size: 10px; color: #888; display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <header id="header-text">Iron Will</header>

    <div id="main-screen" class="screen">
        <button id="reset-btn" onclick="resetCounter()">↺</button>
        <div class="counter-section">
            <div class="circle">
                <div class="days-val" id="d-days">0 days</div>
                <div class="timer-val" id="d-time">00:00:00</div>
            </div>
            <p style="font-size: 8px; color: #999;">Press Physical BACK Key to Back</p>
        </div>
        <div class="controls">
            <button class="btn" onclick="showRanks()">
                <div class="icon-btn">★</div>My Rank
            </button>
            <button class="btn" onclick="showHistory()">
                <div class="icon-btn">🕒</div>History
            </button>
        </div>
    </div>

    <div id="rank-screen" class="screen"><div id="rank-list" style="padding-top:5px"></div><span class="back-key-visual">←</span></div>
    <div id="history-screen" class="screen"><div id="history-list" style="padding-top:5px"></div><span class="back-key-visual">←</span></div>

</div>

<script>
    let startTime = parseInt(localStorage.getItem('startTime')) || Date.now();
    let historyLogs = JSON.parse(localStorage.getItem('historyLogs')) || [];
    localStorage.setItem('startTime', startTime);

    const ranks = [
        {n: "Scout", d: 1}, {n: "Private", d: 3}, {n: "Corporal", d: 5},
        {n: "Sergeant", d: 7}, {n: "Knight", d: 14}, {n: "Commander", d: 120}
    ];

    function updateTimer() {
        const diff = Date.now() - startTime;
        const d = Math.floor(diff / 86400000);
        const fmt = (v) => v < 10 ? '0' + v : v;
        const h = Math.floor((diff / 3600000) % 24);
        const m = Math.floor((diff / 60000) % 60);
        const s = Math.floor((diff / 1000) % 60);
        document.getElementById('d-days').innerText = d + " days";
        document.getElementById('d-time').innerText = `${fmt(h)}:${fmt(m)}:${fmt(s)}`;
    }

    // Screens management
    function showMain() {
        document.getElementById('main-screen').style.display = 'flex';
        document.getElementById('rank-screen').style.display = 'none';
        document.getElementById('history-screen').style.display = 'none';
        document.getElementById('header-text').innerText = "Iron Will";
        document.querySelectorAll('.back-key-visual').forEach(v => v.style.display = 'none');
    }

    function showRanks() {
        showScreen('rank-screen', 'My Rank', ranks_list_html());
    }

    function showHistory() {
        showScreen('history-screen', 'History', history_list_html());
    }

    function showScreen(screenId, title, content) {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById(screenId).style.display = 'block';
        document.getElementById(screenId).firstElementChild.innerHTML = content;
        document.getElementById('header-text').innerText = title;
        document.querySelectorAll('.back-key-visual').forEach(v => v.style.display = 'block'); // Show Back key hint
    }

    function ranks_list_html() {
        const d = Math.floor((Date.now() - startTime) / 86400000);
        let h = "";
        ranks.forEach(r => h += `<div class="card ${d >= r.d ? 'achieved' : ''}"><span class="card-title">${r.n}</span><span class="card-sub">Reach ${r.d} days</span></div>`);
        return h;
    }

    function history_list_html() {
        if(historyLogs.length === 0) return "<p style='text-align:center; font-size:9px;'>No history</p>";
        let h = "";
        historyLogs.slice().reverse().forEach(log => h += `<div class="card" style="text-align:left"><span class="card-title">${log.days} days</span><span class="card-sub">${log.start} → ${log.end}</span></div>`);
        return h;
    }

    function resetCounter() {
        if(confirm("Reset?")) {
            const d = Math.floor((Date.now() - startTime) / 86400000);
            const fmt = (ts) => new Date(ts).toLocaleString('en-GB', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
            historyLogs.push({ days: d, start: fmt(startTime), end: fmt(Date.now()) });
            localStorage.setItem('historyLogs', JSON.stringify(historyLogs));
            startTime = Date.now();
            localStorage.setItem('startTime', startTime);
            updateTimer();
        }
    }

    // --- KEYPAD KEY SUPPORT ---
    // Physical keypad-er physical key events track kora
    document.addEventListener('keydown', function(e) {
        // J2ME context context specific keys
        // "Escape" generally BACK key J2ME Simulator context context
        // J2ME specific Loader context setting specific key codes use use context
        if(e.key === "Backspace" || e.key === "Escape" || e.key === "End" || e.keyCode === 27 || e.keyCode === 119) {
            e.preventDefault(); // Browser's default action stop
            showMain(); // Main screen fire fire context
        }
    });

    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
    </html>
