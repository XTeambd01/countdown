<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Iron Will PWA</title> <style> body { background-color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; } #app-container { width: 240px; height: 320px; background-color: #f3f4f6; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; } header { background-color: #2c3e50; color: white; padding: 8px; font-size: 13px; font-weight: bold; text-align: center; } /* Screens */ .screen { flex-grow: 1; display: flex; flex-direction: column; width: 100%; height: 245px; position: relative; } #rank-screen, #history-screen { display: none; overflow-y: auto; background: #f8f9fa; } /* Main Counter UI */ .counter-section { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; } .circle { width: 120px; height: 120px; border: 4px solid #d1d5db; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; } .days { font-size: 18px; font-weight: bold; color: #333; } .timer { font-size: 11px; color: #6b7280; } /* Buttons & Controls */ .controls { display: flex; justify-content: space-around; padding: 10px 0; background: #fff; border-top: 1px solid #ddd; } .btn { border: none; background: none; font-size: 9px; cursor: pointer; text-align: center; } .icon-btn { width: 30px; height: 30px; background: #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 3px; font-size: 14px; } #reset-btn { position: absolute; right: 10px; top: 110px; background: #ff4d4d; color: white; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 18px; z-index: 10; } /* Rank & History Cards */ .card { background: white; margin: 5px 8px; padding: 8px; border-radius: 4px; border: 1px solid #ddd; text-align: center; } .card-title { font-size: 12px; font-weight: bold; color: #2c3e50; border-bottom: 1px solid #eee; margin-bottom: 3px; display: block;} .card-sub { font-size: 10px; color: #7f8c8d; } .achieved { background-color: #d1fae5; border-color: #10b981; } /* Cloud Phone Nav Bar (Fixed at bottom) */ .cloud-nav { background-color: #000; height: 35px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; } .nav-item { color: white; font-size: 18px; cursor: pointer; background: none; border: none; } .nav-home { width: 16px; height: 16px; border: 2px solid white; border-radius: 50%; } </style> </head> <body> <div id="app-container"> <header id="header-title">Iron Will</header> <div id="main-screen" class="screen"> <button id="reset-btn" onclick="resetCounter()">↺</button> <div class="counter-section"> <div class="circle"> <div class="days" id="display-days">0 days</div> <div class="timer" id="display-time">00:00:00</div> </div> </div> <div class="controls"> <button class="btn" onclick="showRanks()"> <div class="icon-btn">★</div>My Rank </button> <button class="btn" onclick="showHistory()"> <div class="icon-btn">🕒</div>History </button> </div> </div> <div id="rank-screen" class="screen"> <div id="rank-list" style="padding-top: 5px;"></div> </div> <div id="history-screen" class="screen"> <div id="history-list" style="padding-top: 5px;"></div> </div> <div class="cloud-nav"> <button class="nav-item" onclick="alert('Menu: About & Policy')">≡</button> <div class="nav-home" onclick="showMain()"></div> <button class="nav-item" onclick="showMain()">←</button> </div> </div> <script> let startTime = parseInt(localStorage.getItem('startTime')) || Date.now(); let historyLogs = JSON.parse(localStorage.getItem('historyLogs')) || []; localStorage.setItem('startTime', startTime); const ranks = [ { n: "Scout", d: 1 }, { n: "Private", d: 3 }, { n: "Corporal", d: 5 }, { n: "Sergeant", d: 7 }, { n: "Master Sergeant", d: 10 }, { n: "Knight", d: 14 }, { n: "Knight-Captain", d: 30 }, { n: "Commander", d: 120 } ]; function formatTime(ts) { const d = new Date(ts); return `${d.getDate()} ${d.toLocaleString('en-US', {month:'short'})} ${d.getFullYear()} ${d.getHours()}:${(d.getMinutes()<10?'0':'')+d.getMinutes()}`; } function updateTimer() { const diff = Date.now() - startTime; const s = Math.floor((diff / 1000) % 60); const m = Math.floor((diff / (1000 * 60)) % 60); const h = Math.floor((diff / (1000 * 60 * 60)) % 24); const d = Math.floor(diff / (1000 * 60 * 60 * 24)); document.getElementById('display-days').innerText = d + " days"; document.getElementById('display-time').innerText = (h<10?"0":"")+h + ":" + (m<10?"0":"")+m + ":" + (s<10?"0":"")+s; } function showMain() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById('main-screen').style.display = 'flex'; document.getElementById('header-title').innerText = "Iron Will"; } function showRanks() { const d = Math.floor((Date.now() - startTime) / 86400000); const list = document.getElementById('rank-list'); list.innerHTML = ""; ranks.forEach(r => { list.innerHTML += `<div class="card ${d >= r.d ? 'achieved' : ''}"> <span class="card-title">${r.n}</span> <span class="card-sub">Reach ${r.d} days</span> </div>`; }); document.getElementById('main-screen').style.display = 'none'; document.getElementById('rank-screen').style.display = 'block'; document.getElementById('header-title').innerText = "My Rank"; } function showHistory() { const list = document.getElementById('history-list'); list.innerHTML = ""; if(historyLogs.length === 0) { list.innerHTML = "<p style='text-align:center; font-size:10px;'>No history yet.</p>"; } else { historyLogs.slice().reverse().forEach(log => { list.innerHTML += `<div class="card" style="text-align:left"> <span class="card-title">${log.days} days</span> <span class="card-sub">${log.start} --> ${log.end}</span> </div>`; }); } document.getElementById('main-screen').style.display = 'none'; document.getElementById('history-screen').style.display = 'block'; document.getElementById('header-title').innerText = "History"; } function resetCounter() { if(confirm("Reset streak?")) { const d = Math.floor((Date.now() - startTime) / 86400000); const newLog = { days: d, start: formatTime(startTime), end: formatTime(Date.now()) }; historyLogs.push(newLog); localStorage.setItem('historyLogs', JSON.stringify(historyLogs)); startTime = Date.now(); localStorage.setItem('startTime', startTime); updateTimer(); } } setInterval(updateTimer, 1000); updateTimer(); </script> </body> </html>
